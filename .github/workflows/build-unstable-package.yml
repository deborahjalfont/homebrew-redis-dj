name: Build Redis CE MacOS Unstable Package

on:
  pull_request:
    branches: [ unstable ]
    paths:
      - '.github/workflows/build-unstable-package.yml'
      - 'configs/**'
      - 'scripts/**'
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Redis CE MacOS Unstable Package
    strategy:
      fail-fast: false
      matrix:
        os_version:         # See: https://github.com/actions/runner-images/blob/main/README.md#available-images
          - macos-13        # macOS 13 x86_64
#          - macos-13-xlarge # macOS 13 arm64

    runs-on: ${{ matrix.os_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Use unstable branch when called via workflow_call (from nightly scheduler)
          # Use current branch when triggered by PR (for testing)
          ref: ${{ github.event_name == 'workflow_call' && 'unstable' || github.ref }}

      - name: Install build dependencies
        run: |
          scripts/install_deps.sh

      - name: Build Redis CE Unstable
        id: build
        run: |
          # Use unstable branch instead of tagged version
          scripts/build_unstable.sh
          echo "UNSIGNED_REDIS_BINARY=unsigned-redis-ce-unstable-$(uname -m).zip" >> $GITHUB_OUTPUT

      - name: Upload Redis CE Binary Distribution
        uses: actions/upload-artifact@v4
        with:
          path: ./${{ steps.build.outputs.UNSIGNED_REDIS_BINARY }}
          name: ${{ steps.build.outputs.UNSIGNED_REDIS_BINARY }}

      - name: Capture build logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/build-logs

          echo "Build failed for homebrew on ${{ matrix.os_version }}"
          echo "Capturing detailed logs for troubleshooting..."

          # Get system info
          uname -a > /tmp/build-logs/system-info.log 2>&1
          brew --version > /tmp/build-logs/brew-info.log 2>&1

          # Get build directory contents if it exists
          if [ -d "build_dir" ]; then
            find build_dir -type f > /tmp/build-logs/build-dir-contents.log 2>&1 || echo "Failed to list build directory"
          fi

          # Get Redis build logs if they exist
          if [ -f "redis-unstable/src/Makefile" ]; then
            make -C redis-unstable -n > /tmp/build-logs/makefile-dry-run.log 2>&1 || echo "Failed to get makefile dry run"
          fi

          # Create a summary file
          {
            echo "Build failure summary for homebrew on ${{ matrix.os_version }}"
            echo "Date: $(date)"
            echo "GitHub SHA: ${{ github.sha }}"
            echo "OS Version: ${{ matrix.os_version }}"
            echo "Distribution: homebrew"
          } > /tmp/build-logs/failure-summary.txt

          echo "Log capture complete"

      - name: Upload build failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-${{ matrix.os_version }}-homebrew
          path: /tmp/build-logs/
          if-no-files-found: warn

  test:
    name: Test Redis CE Unstable Package
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os_version:
          - macos-13        # macOS 13 x86_64
#          - macos-13-xlarge # macOS 13 arm64

    runs-on: ${{ matrix.os_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Use unstable branch when called via workflow_call (from nightly scheduler)
          # Use current branch when triggered by PR (for testing)
          ref: ${{ github.event_name == 'workflow_call' && 'unstable' || github.ref }}

      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: unsigned-redis-ce-unstable-${{ matrix.os_version == 'macos-13' && 'x86_64' || 'arm64' }}.zip

      - name: Install runtime dependencies
        run: |
          # Extract runtime dependencies from cask file
          DEPS=$(grep 'depends_on formula:' Casks/redis.rb | sed 's/.*depends_on formula: "\([^"]*\)".*/\1/' | tr '\n' ' ')
          echo "Installing runtime dependencies from cask file: $DEPS"
          brew install $DEPS

      - name: Extract and setup Redis
        run: |
          unzip unsigned-redis-ce-unstable-*.zip
          echo "REDIS_HOME=$(pwd)" >> $GITHUB_ENV
          echo "$(pwd)/bin" >> $GITHUB_PATH
          chmod +x bin/redis-*

      - name: Test Redis Installation
        run: |
          redis-server --version

          # Load modules manually since we're using a custom build without pre-configured redis.conf
          # (unlike the official cask which has modules pre-configured in the config file)
          redis-server --port 6379 --daemonize yes --logfile redis-server.log \
            --loadmodule "$REDIS_HOME/lib/redis/modules/redisbloom.so" \
            --loadmodule "$REDIS_HOME/lib/redis/modules/redisearch.so" \
            --loadmodule "$REDIS_HOME/lib/redis/modules/redistimeseries.so" \
            --loadmodule "$REDIS_HOME/lib/redis/modules/rejson.so"

          # Wait for Redis to start (same pattern as public repo)
          for i in {1..30}; do
            redis-cli ping && break || echo "Waiting for Redis... $i" && sleep 1
          done

          # Verify Redis is running and get info (same as public repo)
          redis-cli info server || { echo "Cannot get server info"; cat redis-server.log; exit 1; }
          redis-cli module list

          # Save logs for debugging
          mkdir -p /tmp/redis-logs
          cp redis-server.log /tmp/redis-logs/ 2>/dev/null || echo "No Redis logs to save"

      - name: Upload Redis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redis-logs-${{ matrix.os_version }}
          path: /tmp/redis-logs/

      - name: Verify Installed Modules
        run: |
          modules=$(redis-cli module list)
          echo "Installed modules:"
          echo "$modules"
          missing_modules=()
          for module in "bf" "search" "timeseries" "ReJSON"; do
            if ! echo "$modules" | grep -q "$module"; then
              missing_modules+=("$module")
            fi
          done
          if [ ${#missing_modules[@]} -eq 0 ]; then
            echo "All required modules are installed"
          else
            echo "The following modules are missing: ${missing_modules[*]}"
            exit 1
          fi

      - name: Test RedisBloom
        run: |
          redis-cli BF.ADD popular_keys "redis:hash"
          redis-cli BF.ADD popular_keys "redis:set"
          [ "$(redis-cli BF.EXISTS popular_keys "redis:hash")" = "1" ] || \
            { echo "RedisBloom test failed: 'redis:hash' not found"; exit 1; }
          [ "$(redis-cli BF.EXISTS popular_keys "redis:list")" = "0" ] || \
            { echo "RedisBloom test failed: 'redis:list' found unexpectedly"; exit 1; }
          echo "RedisBloom test passed successfully"

      - name: Test RediSearch
        run: |
          redis-cli FT.CREATE redis_commands ON HASH PREFIX 1 cmd: SCHEMA name TEXT SORTABLE description TEXT
          redis-cli HSET cmd:set name "SET" description "Set the string value of a key"
          redis-cli HSET cmd:get name "GET" description "Get the value of a key"
          result=$(redis-cli FT.SEARCH redis_commands "value")
          if echo "$result" | grep -q "Set the string value of a key" && \
              echo "$result" | grep -q "Get the value of a key"; then
            echo "RediSearch test passed successfully"
          else
            echo "RediSearch test failed: expected commands not found in search results"
            exit 1
          fi

      - name: Test RedisTimeSeries
        run: |
          redis-cli TS.CREATE redis:cpu:usage RETENTION 86400
          redis-cli TS.ADD redis:cpu:usage "*" 80
          redis-cli TS.ADD redis:cpu:usage "*" 65
          redis-cli TS.ADD redis:cpu:usage "*" 70
          result=$(redis-cli TS.RANGE redis:cpu:usage - + COUNT 3)
          if echo "$result" | grep -q "80" && \
              echo "$result" | grep -q "65" && \
              echo "$result" | grep -q "70"; then
            echo "RedisTimeSeries test passed successfully"
          else
            echo "RedisTimeSeries test failed: expected values not found in time series"
            exit 1
          fi

      - name: Test ReJSON
        run: |
          redis-cli JSON.SET redis:config $ '{"maxmemory":"2gb","maxmemory-policy":"allkeys-lru"}'
          result=$(redis-cli JSON.GET redis:config $.maxmemory-policy)
          cleaned_result=$(echo $result | tr -d '[]"')
          if [ "$cleaned_result" = "allkeys-lru" ]; then
            echo "ReJSON test passed successfully"
          else
            echo "ReJSON test failed: expected 'allkeys-lru', got $result"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          redis-cli shutdown || true
